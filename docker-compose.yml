services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./conf:/usr/src/app/conf
      - ./data:/usr/src/app/data
      # Update this path to point to your local IRC log directory (used by chat_log_upload)
      - /Users/amiantos/.local/share/weechat/logs:/usr/src/app/irc-logs:ro
    environment:
      - NODE_ENV=production
    command: npm start
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
